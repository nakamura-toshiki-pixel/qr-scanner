<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面取工程 段取承認カメラ</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #333;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }
    h2 {
      text-align: center;
      margin-top: 0;
      color: #2c3e50;
      font-size: 22px;
      border-bottom: 2px solid #eef2f5;
      padding-bottom: 15px;
    }
    .info-box {
      background-color: #e8f4fd;
      border-left: 4px solid #3498db;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .section-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #34495e;
    }
    #button-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 25px;
    }
    .target-btn {
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      background-color: #fff;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
    }
    .target-btn:hover {
      background-color: #f8fafc;
    }
    .target-btn.selected {
      background-color: #ebf5ff;
      border-color: #3b82f6;
      color: #2563eb;
      box-shadow: 0 0 0 1px #3b82f6;
    }
    .target-btn::before {
      content: "○";
      margin-right: 12px;
      font-size: 18px;
      color: #94a3b8;
    }
    .target-btn.selected::before {
      content: "●";
      color: #3b82f6;
    }
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      display: none;
    }
    #loading {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 15px;
    }
    #status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
      display: none;
    }
    .success { background-color: #dcfce7; color: #15803d; }
    .error { background-color: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>

<div class="container">
  <h2>面取工程 段取承認</h2>
  
  <div class="info-box" id="sheet-display">対象シートを読み込み中...</div>
  
  <div class="section-title">1. ハンコを押す場所を選択してください</div>
  <div id="loading">スプレッドシートから承認項目を取得しています...</div>
  <div id="button-container"></div>
  
  <div class="section-title">2. QRコードをかざしてください</div>
  <div id="reader"></div>
  
  <div id="status"></div>
</div>

<script>
  // 中村様の本番用GASのURLを設定済みです
  const GAS_URL = "https://script.google.com/macros/s/AKfycbweVc3Sm0YA0Gbrfm5ekaTdxoB5Ud0pgpayN7YK28b25VVLy5ZDA6StpcyoCJ3hbatjEA/exec";

  const urlParams = new URLSearchParams(window.location.search);
  let sheetName = urlParams.get('sheet') || "段取チェックシート①"; 
  
  document.getElementById('sheet-display').innerText = `現在の操作対象: ${sheetName}`;
  
  let selectedTarget = ""; 
  let html5Qrcode = null; // お試し版と同様、自由度の高いhtml5Qrcodeクラスを使用します

  // 画面起動時にボタンのリストを取得
  window.addEventListener('DOMContentLoaded', () => {
    fetch(`${GAS_URL}?action=getButtons&sheet=${encodeURIComponent(sheetName)}`)
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('button-container');
        
        if (data.success && data.targets.length > 0) {
          data.targets.forEach((targetText, index) => {
            const btn = document.createElement('button');
            btn.className = 'target-btn';
            btn.innerText = targetText;
            btn.onclick = () => selectTarget(btn, targetText);
            container.appendChild(btn);
          });
        } else {
          document.getElementById('loading').innerText = "承認項目が見つかりませんでした。シートに「職制印」の文字があるか確認してください。";
        }
      })
      .catch(err => {
        document.getElementById('loading').className = "error";
        document.getElementById('loading').innerText = "エラー: スプレッドシートとの通信に失敗しました。";
        console.error(err);
      });
  });

  // ボタン選択時
  function selectTarget(element, targetText) {
    document.querySelectorAll('.target-btn').forEach(btn => btn.classList.remove('selected'));
    element.classList.add('selected');
    selectedTarget = targetText;
    
    // 選択されたら即座にカメラを起動
    startCamera();
  }

  // カメラを「背面優先」で即座に起動する処理
  function startCamera() {
    const readerDiv = document.getElementById('reader');
    readerDiv.style.display = 'block';
    
    if (html5Qrcode) return; // 既に起動してればスキップ
    
    html5Qrcode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    
    // ★お試し版と同様：まずは背面カメラ（environment）を試みる
    html5Qrcode.start({ facingMode: "environment" }, config, onScanSuccess)
      .catch(err => {
        console.log("背面カメラがない、またはエラーのため前面カメラを試みます:", err);
        // 背面がダメなら前面カメラ（user）で起動
        html5Qrcode.start({ facingMode: "user" }, config, onScanSuccess)
          .catch(e => {
            showStatus("カメラの起動に失敗しました。ブラウザのカメラ権限を許可してください。", "error");
          });
      });
  }

  // スキャン成功時
  function onScanSuccess(decodedText, decodedResult) {
    // 送信前にカメラを止めて画面をスッキリさせる
    if (html5Qrcode) {
      html5Qrcode.stop().then(() => {
        html5Qrcode = null;
        document.getElementById('reader').style.display = 'none';
        sendData(decodedText);
      }).catch(err => {
        console.error("カメラの停止に失敗:", err);
        sendData(decodedText);
      });
    } else {
      sendData(decodedText);
    }
  }

  // サーバーへの送信処理
  function sendData(qrText) {
    showStatus("サーバーへ送信中...", "");

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        qrText: qrText,
        sheetName: sheetName,
        targetText: selectedTarget
      })
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        showStatus(data.message, "success");
      } else {
        showStatus("エラー: " + data.message, "error");
        setTimeout(() => startCamera(), 2000); // 失敗時は2秒後にカメラ再起動
      }
    })
    .catch(err => {
      showStatus("通信エラーが発生しました。", "error");
      setTimeout(() => startCamera(), 2000);
    });
  }

  function showStatus(msg, className) {
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'block';
    statusDiv.innerText = msg;
    statusDiv.className = className;
  }
</script>

</body>
</html>
