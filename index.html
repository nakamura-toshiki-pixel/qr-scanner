<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面取工程 段取承認カメラ</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #333;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }
    h2 {
      text-align: center;
      margin-top: 0;
      color: #2c3e50;
      font-size: 22px;
      border-bottom: 2px solid #eef2f5;
      padding-bottom: 15px;
    }
    .info-box {
      background-color: #e8f4fd;
      border-left: 4px solid #3498db;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .section-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #34495e;
    }
    /* 動的ボタンのスタイル */
    #button-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 25px;
    }
    .target-btn {
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      background-color: #fff;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
    }
    .target-btn:hover {
      background-color: #f8fafc;
    }
    .target-btn.selected {
      background-color: #ebf5ff;
      border-color: #3b82f6;
      color: #2563eb;
      box-shadow: 0 0 0 1px #3b82f6;
    }
    .target-btn::before {
      content: "○";
      margin-right: 12px;
      font-size: 18px;
      color: #94a3b8;
    }
    .target-btn.selected::before {
      content: "●";
      color: #3b82f6;
    }
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      display: none;
    }
    #loading {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 15px;
    }
    #status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
      display: none;
    }
    .success { background-color: #dcfce7; color: #15803d; }
    .error { background-color: #fee2e2; color: #b91c1c; }
  </style>
</head>
<body>

<div class="container">
  <h2>面取工程 段取承認</h2>
  
  <div class="info-box" id="sheet-display">対象シートを読み込み中...</div>
  
  <div class="section-title">1. ハンコを押す場所を選択してください</div>
  <div id="loading">スプレッドシートから承認項目を取得しています...</div>
  <div id="button-container"></div>
  
  <div class="section-title">2. QRコードをかざしてください</div>
  <div id="reader"></div>
  
  <div id="status"></div>
</div>

<script>
  // ==========================================
  // 【最重要】中村様の本番用GASウェブアプリURLをここに貼り付け
  // ==========================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbweVc3Sm0YA0Gbrfm5ekaTdxoB5Ud0pgpayN7YK28b25VVLy5ZDA6StpcyoCJ3hbatjEA/exec";

  // URLの末尾から「どのシートか」のパラメータを取得 (?sheet=段取チェックシート① など)
  const urlParams = new URLSearchParams(window.location.search);
  let sheetName = urlParams.get('sheet') || "段取チェックシート①"; // 省略時は①にする
  
  document.getElementById('sheet-display').innerText = `現在の操作対象: ${sheetName}`;
  
  let selectedTarget = ""; // 職制が選んだ承認位置の文字を記憶する変数
  let html5QrcodeScanner = null;

  // 画面起動時に、GASに「承認ボタンのリスト」を貰いに行く処理
  window.addEventListener('DOMContentLoaded', () => {
    fetch(`${GAS_URL}?action=getButtons&sheet=${encodeURIComponent(sheetName)}`)
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('button-container');
        
        if (data.success && data.targets.length > 0) {
          // GASから届いた「職制印」の文字リストを元に、ボタンを動的に作成
          data.targets.forEach((targetText, index) => {
            const btn = document.createElement('button');
            btn.className = 'target-btn';
            btn.innerText = targetText;
            btn.onclick = () => selectTarget(btn, targetText);
            container.appendChild(btn);
          });
        } else {
          document.getElementById('loading').innerText = "承認項目が見つかりませんでした。シートを確認してください。";
        }
      })
      .catch(err => {
        document.getElementById('loading').className = "error";
        document.getElementById('loading').innerText = "エラー: スプレッドシートとの通信に失敗しました。";
        console.error(err);
      });
  });

  // ボタンがタップされた時の処理
  function selectTarget(element, targetText) {
    // 他のボタンの選択状態を解除
    document.querySelectorAll('.target-btn').forEach(btn => btn.classList.remove('selected'));
    // タップされたボタンをONにする
    element.classList.add('selected');
    selectedTarget = targetText;
    
    // ボタンが選ばれたら、初めてカメラを起動する
    startCamera();
  }

  // カメラを起動する処理
  function startCamera() {
    const readerDiv = document.getElementById('reader');
    readerDiv.style.display = 'block';
    
    if (html5QrcodeScanner) {
      return; // 既に起動してれば何もしない
    }
    
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
      fps: 10, 
      qrbox: { width: 250, height: 250 },
      rememberLastUsedCamera: true
    });
    
    html5QrcodeScanner.render(onScanSuccess);
  }

  // QRコードの読み取りに成功した時の処理
  function onScanSuccess(decodedText, decodedResult) {
    // 読み取り成功したら一度カメラのシークを止める（連続送信防止）
    html5QrcodeScanner.clear();
    html5QrcodeScanner = null;
    document.getElementById('reader').style.display = 'none';
    
    showStatus("サーバーへ送信中...", "");

    // GASのdoPostへデータを送信
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        qrText: decodedText,
        sheetName: sheetName,
        targetText: selectedTarget
      })
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        showStatus(data.message, "success");
      } else {
        showStatus("エラー: " + data.message, "error");
        // 失敗した場合は、ボタンの選択状態を維持してカメラを再起動できるようにする
        setTimeout(() => startCamera(), 2000);
      }
    })
    .catch(err => {
      showStatus("通信エラーが発生しました。", "error");
      setTimeout(() => startCamera(), 2000);
    });
  }

  // 画面に成否のメッセージを表示する補助機能
  function showStatus(msg, className) {
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'block';
    statusDiv.innerText = msg;
    statusDiv.className = className;
  }
</script>

</body>
</html>
